name: Build Debug APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

      - name: Print build errors on failure
        if: failure()
        run: |
          echo "## Build Failure Log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "error:|Error:|FAILED|Exception|Caused by:|> Task|e:" build.log | tail -60 >> "$GITHUB_STEP_SUMMARY" || tail -80 build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      - name: Rename and stage APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/AggregatorX-v${{ github.run_number }}-debug.apk"
          ls -lh artifacts/

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AggregatorX-debug-${{ github.run_number }}
          path: artifacts/AggregatorX-v${{ github.run_number }}-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          SIZE=$(du -sh artifacts/*.apk | cut -f1)
          SHA=$(sha256sum artifacts/*.apk | cut -d' ' -f1)
          {
            echo "## AggregatorX Debug — Build #${{ github.run_number }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| APK size | $SIZE |"
            echo "| SHA-256 | \`${SHA:0:16}…\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo ""
            echo "Download from **Actions → This run → Artifacts**."
          } >> "$GITHUB_STEP_SUMMARY"
